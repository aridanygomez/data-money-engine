name: Ejecutor Autonomo de Contenido

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 07:00 CET (cada mañana)
  workflow_dispatch:      # Permite ejecutarlo a mano desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para git push

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests tweepy praw

      - name: Ejecutar bot generador
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot_generador.py

      - name: Publicar en redes sociales
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python social_poster.py

      - name: Guardar cambios en GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'DataBot'
          git config --global user.email 'bot@github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/aridanygomez/data-money-engine.git
          git add data/ docs/
          git commit -m "Auto: $(date +'%Y-%m-%d') — $(python -c "import json,pathlib; d=json.loads(pathlib.Path('data/models.json').read_text()) if pathlib.Path('data/models.json').exists() else []; print(f'{len(d)} models')" 2>/dev/null || echo 'data updated')" || exit 0
          git push

